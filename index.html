<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BLE 电子纸</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
</head>

<body>

  <!-- 顶部状态条 -->
  <div id="topStatusBar">
    <div id="statusButtons">
      <button class="status-btn" data-target="window1">
        <span class="status-dot"></span>
        <span id="bleStatusLabel" class="status-text">蓝牙</span>
      </button>
      <button class="status-btn" data-target="window2">
        <span class="status-dot"></span>
        <span id="wifiStatusLabel" class="status-text">WiFi</span>
      </button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;">
      <a id="githubLink" href="https://github.com/Martlet-Tech/web_ble_epaper" target="_blank" title="GitHub 仓库">
        <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      </a>
      <button id="guideBtn" class="status-btn" style="display:flex;align-items:center;gap:4px;background:rgba(100,100,100,0.85);">
        <span style="font-size:15px;">📖</span>
        <span>引导</span>
      </button>
      <button id="advancedBtn" class="status-btn" style="display:flex;align-items:center;gap:4px;background:rgba(100,100,100,0.85);">
        <span style="font-size:15px;">⚙</span>
        <span>高级</span>
      </button>
    </div>
  </div>

  <!-- 弹窗1 -->
  <div id="window1" class="status-window">
    <form>
      <div class="window-row">
        <label for="namePrefix">名称前缀</label>
        <input id="namePrefix" type="text" placeholder="设备名关键字" value="">
      </div>
      <input id="name" type="text" placeholder="Device Name" hidden>
      <div id="bleStatusIndicator" class="ble-status">
        <span class="status-dot"></span>
        <span class="status-text">蓝牙未连接</span>
      </div>
      <div class="window-row">
        <label id="bleDeviceLabel">扫描蓝牙设备</label>
        <button type="button" id="scanBLEBtn">🔍 扫描</button>
      </div>
    </form>
  </div>

  <!-- 弹窗2 -->
  <div id="window2" class="status-window">
    <form>
      <div class="window-row">
        <label>SSID:</label> <input id="ssid" type="text" value="Outside">
      </div>
      <div class="window-row">
        <label>密码:</label> <input id="password" type="text" value="yeslcd123">
      </div>
      <div class="window-row" >
        <label>IP 地址:</label>
        <input id="ipAddress" type="text" readonly placeholder="未连接">
      </div>
      <div class="window-row">
        <button type="button" id="getIPBtn">查询 IP</button>
        <button type="button" id="setWifiBtn">连接 WiFi</button>
      </div>
    </form>
  </div>

  <!-- 高级设置弹窗 -->
  <div id="advancedWindow" class="status-window advanced-window">
    <div class="window-header">
      <span style="font-weight:700;font-size:15px;">⚙ 高级设置</span>
      <button id="closeAdvancedBtn" class="window-close-btn">✕</button>
    </div>

    <!-- 扫描选项 -->
    <div class="window-section" id="bleFilterSection">
      <div class="window-section-title">蓝牙扫描选项</div>
      <div class="window-row">
        <label for="allDevices">扫描所有设备</label>
        <input id="allDevices" type="checkbox">
      </div>
      <div class="window-row">
        <label for="service">服务 UUID</label>
        <input id="service" type="text" placeholder="如 0x00FF" value="0x00FF">
      </div>
      <div class="window-row">
        <label for="characteristic">特征值</label>
        <input id="characteristic" type="text" placeholder="可选">
      </div>
    </div>

    <!-- 设备配置 -->
    <div class="window-section">
      <div class="window-section-title">设备配置</div>
      <div id="setdevice">
        <div class="window-row">
          <label>屏幕型号:</label>
          <select id="modelSet"></select>
          <button id="setdeviceBtn" style="margin:0;">设置型号</button>
        </div>
        <div class="window-row">
          <label>自定义名称:</label>
          <input id="customName" type="text" placeholder="蓝牙广播名称">
          <button id="setCustomNameBtn" style="margin:0;">设置</button>
        </div>
        <div class="window-row">
          <label>工作模式:</label>
          <select id="woringModeSet">
            <option value="0">0: 正常模式</option>
            <option value="1">1: 相册模式</option>
          </select>
          <button id="setModeBtn" style="margin:0;">设置</button>
        </div>
      </div>
    </div>

    <!-- 图像操作 -->
    <div class="window-section">
      <div class="window-section-title">图像操作</div>
      <div class="window-row">
        <button id="exportBinBtn" style="margin:0;">导出 BIN</button>
        <button id="importBinBtn" style="margin:0;">导入 BIN</button>
        <input type="file" id="fileInput" style="display:none;" accept=".bin">
        <button id="quantizedImagebtn" style="margin:0;">刷新预览</button>
      </div>
      <div class="window-row" style="margin-top:8px;">
        <button id="ClearBtn" style="margin:0;background-color:#e74c3c;">清屏</button>
      </div>
    </div>

    <!-- Flash 管理 -->
    <div class="window-section">
      <div class="window-section-title">Flash 管理</div>
      <div class="window-row">
        <button id="saveToFlashBtn" class="btn" style="margin:0;">💾 持久化到 Flash</button>
        <button id="clearFlashBtn" class="btn btn-danger" style="margin:0;">🗑️ 清空 Flash</button>
      </div>
    </div>
  </div>

  <div id="mainContainer">

    <!-- 传输进度遮罩 -->
    <div id="transferOverlay" class="overlay" style="display:none;">
      <div id="loaderBox" class="loader-container">
        <div class="spinner">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <div class="loader-text">
          <div id="loaderProgress">0%</div>
          <div id="loaderTime">0.0s</div>
        </div>
        <div id="statusText" class="status-msg"></div>
      </div>
    </div>

    <!-- ── 设备信息（只读） ──────────────────────────────────── -->
    <div id="deviceInfo" class="control-group">
      <div class="row">
        <label>型号:</label>
        <input id="modelGet" type="text" readonly>
      </div>
      <div class="row">
        <label>宽:</label> <input id="width" type="text" readonly>
        <label>高:</label> <input id="height" type="text" readonly>
        <label>BPP:</label> <input id="BPP" type="text" readonly>
      </div>
      <div class="row">
        <label>调色板:</label>
        <span id="paletteContainer" style="display:inline-flex;gap:5px;margin-left:10px;">
          <div style="width:20px;height:20px;background:#FF0000;"></div>
          <div style="width:20px;height:20px;background:#00FF00;"></div>
          <div style="width:20px;height:20px;background:#0000FF;"></div>
          <div style="width:20px;height:20px;background:#FFFFFF;"></div>
          <div style="width:20px;height:20px;background:#000000;"></div>
        </span>
      </div>
    </div>

    <hr class="section-divider">

    <!-- ════════════════════════════════════════════════════════
         图片操作区 —— 步骤向导
    ════════════════════════════════════════════════════════ -->
    <div id="imageSection">

      <!-- 步骤导航按钮 -->
      <div id="stepActions">
        <div class="nav-col">
          <button id="prevStepBtn" class="step-circle-btn">←</button>
          <span class="nav-label" id="prevLabel">上一步</span>
        </div>
        <span class="step-line invis"></span>
        <div class="nav-col">
          <span class="step-dot active" data-step="1">1</span>
          <span class="nav-label active" data-s="1">裁剪</span>
        </div>
        <span class="step-line"></span>
        <div class="nav-col">
          <span class="step-dot" data-step="2">2</span>
          <span class="nav-label" data-s="2">文字</span>
        </div>
        <span class="step-line"></span>
        <div class="nav-col">
          <span class="step-dot" data-step="3">3</span>
          <span class="nav-label" data-s="3">量化</span>
        </div>
        <span class="step-line invis"></span>
        <div class="nav-col">
          <button id="nextStepBtn" class="step-circle-btn">→</button>
          <span class="nav-label" id="nextLabel">下一步</span>
        </div>
      </div>

      <!-- 步骤1：裁剪 -->
      <div class="step-panel active" id="step1">
        <div class="step-preview">
          <div class="square-box" id="cropperBox">
            <div class="placeholder" id="cropperPlaceholder">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"
                opacity="0.4">
                <rect x="3" y="3" width="18" height="18" rx="2" />
                <path d="M3 9h18M9 21V9" />
              </svg>
              <span>点击"选择图片"上传</span>
            </div>
            <img id="cropperImage" style="display:none; max-width:100%; max-height:100%;" alt="">
          </div>
        </div>
        <div id="imageToolbar">
          <div id="flipControl">
            <button type="button" id="flipHorizontal">水平</button>
            <button type="button" id="flipVertical">垂直</button>
            <button type="button" id="rotateLeft">CCW90°</button>
            <button type="button" id="rotateRight">CW90°</button>
          </div>
          <div>
            <button id="uploadImageBtn">📂 选择图片</button>
            <input type="file" id="imageInput" accept="image/*" style="display:none">
          </div>
        </div>
      </div>

      <!-- 步骤2：文字编辑 -->
      <div class="step-panel" id="step2">
        <div class="step-preview">
          <div class="square-box" id="textEditBox">
            <div class="placeholder" id="textEditPlaceholder">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"
                opacity="0.4">
                <path d="M4 7V4h16v3M9 20h6M12 4v16" />
              </svg>
              <span>文字编辑预览</span>
            </div>
            <canvas id="textEditCanvas"></canvas>
          </div>
        </div>
        <div id="textToolbar">
          <input type="text" id="textInput" placeholder="输入文字..." style="flex:1;min-width:80px;max-width:200px;padding:5px 8px;border:1px solid #ccc;border-radius:4px;font-size:14px;">
          <button id="addTextBtn" type="button">➕ 添加文字</button>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;">颜色 <input type="color" id="textColorPicker" value="#ffffff" style="width:28px;height:28px;border:none;padding:0;cursor:pointer;"></label>
          <label style="display:flex;align-items:center;gap:4px;font-size:13px;">字号 <input type="range" id="textFontSize" min="12" max="120" value="32" style="width:80px;"><span id="textFontSizeVal">32</span></label>
          <button id="deleteTextBtn" type="button">🗑️ 删除选中</button>
        </div>
      </div>

      <!-- 步骤3：量化 -->
      <div class="step-panel" id="step3">
        <div class="step-preview">
          <div class="square-box" id="quantizedBox">
            <div class="placeholder" id="quantizedPlaceholder">
              <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.1"
                opacity="0.4">
                <rect x="2" y="2" width="9" height="9" />
                <rect x="13" y="2" width="9" height="9" />
                <rect x="2" y="13" width="9" height="9" />
                <rect x="13" y="13" width="9" height="9" />
              </svg>
              <span>量化预览</span>
            </div>
            <img id="quantizedImage" alt="量化图">
          </div>
        </div>
        <div class="adjust-controls" style="margin-top:0;">
          <label class="lut-label">
            色彩增强 (LUT) <input type="checkbox" id="useLutCheckbox" checked>
          </label>
          <div class="slider-row">
            <label>亮度 <span id="brightnessVal">0</span></label>
            <button class="step-btn" data-target="brightness" data-step="-1">−</button>
            <input type="range" id="brightness" min="-100" max="100" value="0">
            <button class="step-btn" data-target="brightness" data-step="1">+</button>
          </div>
          <div class="slider-row">
            <label>对比度 <span id="contrastVal">0</span></label>
            <button class="step-btn" data-target="contrast" data-step="-1">−</button>
            <input type="range" id="contrast" min="-100" max="100" value="0">
            <button class="step-btn" data-target="contrast" data-step="1">+</button>
          </div>
        </div>
      </div>

    </div><!-- #imageSection -->

    <div id="sendArea">
      <button id="sendBtnBle">📤 蓝牙发送</button>
      <button id="sendBtnIP">📤 WiFi 发送</button>
    </div>

    <footer>
      <span>Powered by</span>
      <a href="https://www.yes-lcd.com/" target="_blank"><img src="assets/yes-lcd.jpg" alt="yes-lcd"></a>
      <a href="https://www.newface-epd.com" target="_blank"><img src="assets/newface-epd.png" alt="newface-epd"></a>
    </footer>

    <div id="status">状态：等待操作...</div>

  </div><!-- #mainContainer -->

  <!-- ── 第三方库 ──────────────────────────────────────────── -->
  <script src="libs/RgbQuant/src/rgbquant.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.js"></script>

  <!-- ── 蓝牙底层 & 协议层 ──────────────────────────────────── -->
  <script src="src/services/ble.js"></script>
  <script src="src/services/protocol.js"></script>

  <!-- 使用引导遮罩 -->
  <div id="tourOverlay" class="tour-overlay" style="display:none;">
    <div id="tourHighlight" class="tour-highlight"></div>
    <div id="tourTooltip" class="tour-tooltip">
      <div class="tour-header">
        <span class="tour-step-indicator"><span id="tourStepNum">1</span> / <span id="tourTotalSteps">6</span></span>
        <button id="tourCloseBtn" class="tour-close-btn">✕</button>
      </div>
      <div class="tour-body">
        <div class="tour-text" id="tourText"></div>
        <div class="tour-buttons">
          <button id="tourSkipBtn" class="tour-btn tour-btn-skip">跳过引导</button>
          <button id="tourPrevBtn" class="tour-btn tour-btn-prev" style="display:none;">← 上一步</button>
          <button id="tourNextBtn" class="tour-btn tour-btn-next">下一步 →</button>
          <button id="tourFinishBtn" class="tour-btn tour-btn-finish" style="display:none;">✓ 完成</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 应用模块（按依赖顺序加载）────────────────────────────── -->
  <script src="src/core/state.js"></script>
  <script src="src/core/scheduler.js"></script>
  <script src="src/core/text-editor.js"></script>
  <script src="src/core/image-pipeline.js"></script>
  <script src="src/ui/progress.js"></script>
  <script src="src/ui/wizard.js"></script>
  <script src="src/ui/tour.js"></script>
  <script src="src/ui/app.js"></script>

</body>

</html>
